<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rust Raid Toolkit</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0d0f0e;
    --surface: #141716;
    --surface2: #1a1e1c;
    --border: #2a2f2c;
    --border2: #3a4038;
    --accent: #c8501a;
    --accent2: #e06030;
    --text: #d4cfc8;
    --text2: #8a8f88;
    --text3: #555a54;
    --green: #4a9e6a;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Barlow', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; line-height: 1.5; min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  }
  .page { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
  header { margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  header .eyebrow { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 0.5rem; }
  header h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; color: #eae6de; }
  header p { font-size: 13px; color: var(--text2); margin-top: 4px; }

  .layout { display: grid; grid-template-columns: 280px 1fr; gap: 1.5rem; align-items: start; }
  @media (max-width: 680px) { .layout { grid-template-columns: 1fr; } }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 1.25rem; }
  .panel-title { font-family: var(--mono); font-size: 11px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1rem; }

  .cat-label { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin: 10px 0 4px 2px; }
  .cat-label:first-child { margin-top: 0; }

  .struct-btn {
    background: transparent; border: 1px solid transparent; border-radius: 4px;
    padding: 7px 8px; display: flex; align-items: center; gap: 6px;
    cursor: pointer; width: 100%; text-align: left; transition: background 0.1s;
  }
  .struct-btn:hover { background: var(--surface2); border-color: var(--border); }
  .struct-btn .sname { font-size: 13px; color: var(--text); flex: 1; }
  .struct-btn .shp { font-family: var(--mono); font-size: 11px; color: var(--text3); white-space: nowrap; }
  .add-btn {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 5px;
    background: rgba(200,80,26,0.32); border: 1px solid rgba(231,163,85,0.9);
    color: #fff4e6; font-family: var(--mono); font-size: 18px; font-weight: 700; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.1s, border-color 0.1s, box-shadow 0.1s;
  }
  .add-btn:hover { background: rgba(200,80,26,0.5); border-color: #f0b676; box-shadow: 0 0 0 1px rgba(240,182,118,0.25); }

  .right-col { display: flex; flex-direction: column; gap: 1rem; }

  .raid-list { display: flex; flex-direction: column; gap: 4px; }
  .raid-item {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; padding: 6px 10px;
  }
  .raid-item .ri-name { flex: 1; font-size: 13px; color: var(--text); }
  .raid-item .ri-qty {
    width: 46px; background: var(--bg); border: 1px solid var(--border2);
    border-radius: 3px; color: var(--text); font-family: var(--mono); font-size: 13px;
    padding: 3px 6px; outline: none; text-align: center;
  }
  .raid-item .ri-qty:focus { border-color: var(--accent); }
  .raid-item .ri-hp { font-family: var(--mono); font-size: 11px; color: var(--text3); }
  .remove-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; line-height: 1; padding: 0 2px; transition: color 0.1s; }
  .remove-btn:hover { color: var(--accent); }
  .empty-list { font-family: var(--mono); font-size: 12px; color: var(--text3); padding: 8px 2px; }

  .results-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .res-header {
    display: grid; grid-template-columns: 2.4fr 1fr;
    padding: 8px 14px; background: var(--surface2); border-bottom: 1px solid var(--border);
    font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase;
  }
  .result-row {
    display: grid; grid-template-columns: 2.4fr 1fr;
    padding: 11px 14px; border-bottom: 1px solid var(--border); align-items: center;
  }
  .result-row:last-child { border-bottom: none; }
  .result-row.best { border-left: 2px solid var(--accent); padding-left: 12px; }
  .result-row.satch { border-left: 2px solid var(--green); padding-left: 12px; }
  .combo-name { font-size: 13px; color: var(--text); }
  .combo-name.hl { color: #eae6de; }
  .combo-sub { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-top: 2px; }
  .sval { font-family: var(--mono); font-size: 13px; color: var(--text2); }
  .sval.hl { color: var(--accent2); font-weight: 600; }
  .sval.shl { color: var(--green); }
  .badge { display: inline-block; font-family: var(--mono); font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 6px; border-radius: 3px; margin-left: 6px; vertical-align: middle; }
  .badge.opt { background: rgba(200,80,26,0.15); color: var(--accent); border: 1px solid rgba(200,80,26,0.3); }
  .badge.sat { background: rgba(74,158,106,0.12); color: var(--green); border: 1px solid rgba(74,158,106,0.3); }

  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1rem; }
  @media (max-width: 500px) { .summary-grid { grid-template-columns: 1fr 1fr; } }
  .stat { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 10px 14px; }
  .stat-label { font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .stat-val { font-family: var(--mono); font-size: 18px; color: var(--text); }
  .stat-val.acc { color: var(--accent2); }

  .struct-section { margin-bottom: 1rem; }
  .struct-section:last-child { margin-bottom: 0; }
  .ss-title { font-family: var(--mono); font-size: 11px; color: var(--text2); margin-bottom: 6px; }
  .ss-title span { color: var(--text3); }

  .tabs { display:flex; gap:8px; margin: 1rem 0 1.25rem; }
  .tab-btn {
    background: var(--surface); border: 1px solid var(--border); color: var(--text2);
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 8px 10px; border-radius: 6px; cursor: pointer;
  }
  .tab-btn.active { color: var(--accent2); border-color: var(--accent2); background: rgba(181,123,61,0.1); }
  .tab-content.hidden { display: none; }

  .recycler-row { display:grid; grid-template-columns: 1fr 90px 40px; gap:8px; margin-bottom:8px; }
  .recycler-row select, .recycler-row input {
    background:#0b0d0c; color:var(--text); border:1px solid var(--border); border-radius:4px; padding:6px 8px;
    font-family: var(--mono); font-size: 12px;
  }
  .recycler-row button {
    border:1px solid var(--border); border-radius:4px; background:transparent; color:var(--text3); cursor:pointer;
  }
  .recycler-row button:hover { color: var(--accent2); border-color: var(--accent2); }
  .recycler-out-row { display:flex; justify-content:space-between; gap:8px; padding:6px 0; border-bottom:1px dashed var(--border); font-size:13px; color:var(--text2); }
  .recycler-out-row:last-child { border-bottom:none; }

  .empty { padding: 2.5rem; text-align: center; color: var(--text3); font-size: 13px; font-family: var(--mono); }
</style>
</head>
<body>
<div class="page">
  <header>
    <div class="eyebrow">// rust toolkit</div>
    <h1>Raid Toolkit</h1>
    <p>Add structures to your raid list and get the optimal explosive combination</p>
  </header>

  <div class="tabs">
    <button class="tab-btn active" id="tabRaid">Raid Planner</button>
    <button class="tab-btn" id="tabRecycler">Recycler</button>
  </div>

  <div class="tab-content" id="raidTabContent">
    <div class="layout">
      <div class="panel">
        <div class="panel-title">// structures</div>
        <div id="structList"></div>
      </div>

      <div class="right-col">
        <div class="panel">
          <div class="panel-title">// raid list</div>
          <div class="raid-list" id="raidList">
            <div class="empty-list">No structures added — click + to add</div>
          </div>
        </div>
        <div id="resultsWrap"></div>
      </div>
    </div>
  </div>

  <div class="tab-content hidden" id="recyclerTabContent">
    <div class="layout" style="grid-template-columns: 1fr 1fr;">
      <div class="panel">
        <div class="panel-title">// recycler input</div>
        <div id="recyclerRows"></div>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button id="addRecyclerRow" class="tab-btn">Add Component</button>
          <button id="resetRecycler" class="tab-btn">Reset</button>
        </div>
      </div>
      <div class="panel">
        <div class="panel-title">// recycler output</div>
        <div id="recyclerTotals" class="empty-list">Add components to see recycled resources</div>
      </div>
    </div>
  </div>
</div>

<script>
const STRUCTURES = [
  { id:'wood_wall',    name:'Wood wall',                cat:'Walls',       hp:250  },
  { id:'stone_wall',   name:'Stone wall',               cat:'Walls',       hp:500  },
  { id:'metal_wall',   name:'Sheet metal wall',         cat:'Walls',       hp:1000 },
  { id:'armored_wall', name:'Armored wall',             cat:'Walls',       hp:2000 },
  { id:'hext_wood',    name:'High external wood wall',  cat:'Walls',       hp:500  },
  { id:'hext_stone',   name:'High external stone wall', cat:'Walls',       hp:500  },
  { id:'wood_door',    name:'Wooden door',              cat:'Doors',       hp:200  },
  { id:'metal_door',   name:'Sheet metal door',         cat:'Doors',       hp:250  },
  { id:'armored_door', name:'Armored door',             cat:'Doors',       hp:800  },
  { id:'garage_door',  name:'Garage door',              cat:'Doors',       hp:600  },
  { id:'ladder_hatch', name:'Ladder hatch',             cat:'Doors',       hp:250  },
  { id:'auto_turret',  name:'Auto turret',              cat:'Deployables', hp:1000 },
  { id:'metal_barric', name:'Metal barricade',          cat:'Deployables', hp:400  },
];

const TOOLS = [
  { id:'c4',      name:'C4',        sulfur:2200, finisher:false,
    dmg:{wood_wall:275,stone_wall:275,metal_wall:275,armored_wall:275,hext_wood:325,hext_stone:275,
         wood_door:250,metal_door:275,armored_door:275,garage_door:325,ladder_hatch:275,auto_turret:500,metal_barric:500} },
  { id:'rocket',  name:'Rocket',    sulfur:1400, finisher:false,
    dmg:{wood_wall:145,stone_wall:130,metal_wall:130,armored_wall:137,hext_wood:270,hext_stone:130,
         wood_door:250,metal_door:145,armored_door:165,garage_door:220,ladder_hatch:145,auto_turret:300,metal_barric:300} },
  { id:'satchel', name:'Satchel',   sulfur:480,  finisher:false,
    dmg:{wood_wall:84,stone_wall:50,metal_wall:44,armored_wall:44,hext_wood:84,hext_stone:50,
         wood_door:120,metal_door:63,armored_door:54,garage_door:67,ladder_hatch:63,auto_turret:200,metal_barric:110} },
  { id:'expammo', name:'Exp. ammo', sulfur:25,   finisher:true,
    dmg:{wood_wall:5.21,stone_wall:2.37,metal_wall:2.46,armored_wall:2.48,hext_wood:5.37,hext_stone:2.72,
         wood_door:11,metal_door:3.97,armored_door:3.19,garage_door:4.0,ladder_hatch:3.97,auto_turret:10,metal_barric:3.64} },
];

const MATERIAL_COSTS = {
  c4:      { metal_fragments: 200, low_grade_fuel: 60, cloth: 5, tech_trash: 2 },
  rocket:  { metal_fragments: 100, low_grade_fuel: 30, metal_pipe: 2 },
  satchel: { metal_fragments: 80, cloth: 4, rope: 1, beancan_grenade: 4 },
  expammo: { metal_fragments: 5, gunpowder: 10 },
};

const RESOURCE_COSTS = {
  c4:      { sulfur: 2200, charcoal: 3000, metal_fragments: 200 },
  rocket:  { sulfur: 1400, charcoal: 1800, metal_fragments: 100 },
  satchel: { sulfur: 480,  charcoal: 720,  metal_fragments: 80 },
  expammo: { sulfur: 25,   charcoal: 30,   metal_fragments: 5 },
};

const NODE_YIELDS = {
  sulfur: 300,
  metal_ore: 600,
  stone: 1000,
  wood: 1000,
};

const WOOD_PER_CHARCOAL = 1 / 0.75;

const EXP_AMMO_CLEANUP_HP_LIMIT = 180;
const EXP_AMMO_CLEANUP_COUNT_LIMIT = 40;
const EXP_AMMO_SOFT_PENALTY = 15;

const RECYCLER_DATA = {
  'Metal Pipe': { metal_fragments: 75 },
  'Road Signs': { metal_fragments: 24 },
  'Semi Body': { metal_fragments: 75 },
  'SMG Body': { metal_fragments: 75 },
  'Rifle Body': { metal_fragments: 75 },
  'Gears': { metal_fragments: 13 },
  'Springs': { metal_fragments: 10 },
  'Sheet Metal': { metal_fragments: 100 },
  'Rope': { cloth: 15 },
  'Tarp': { cloth: 50 },
  'Sewing Kit': { cloth: 50 },
  'Tech Trash': { hq_metal: 20 },
  'Rifle Ammo': { gunpowder: 5, metal_fragments: 2 },
  'Pistol Ammo': { gunpowder: 3, metal_fragments: 2 },
};

function fmt(n) { return Math.round(n).toLocaleString(); }

function findOptimal(sid, totalHp) {
  const mains = TOOLS.filter(t => !t.finisher);
  const all = TOOLS;
  let best = null;

  mains.forEach(primary => {
    const dpP = primary.dmg[sid];
    if (!dpP) return;
    const maxP = Math.ceil(totalHp / dpP);
    for (let np = 0; np <= maxP; np++) {
      const rem = totalHp - np * dpP;
      if (rem < 0) break;
      if (rem === 0) {
        const s = np * primary.sulfur;
        const score = s;
        if (!best || score < best.score || (score === best.score && s < best.sulfur)) {
          best = { np, primary, ns:0, secondary:null, sulfur:s, score };
        }
        continue;
      }
      all.forEach(secondary => {
        if (secondary.id === primary.id) return;
        const dsS = secondary.dmg[sid];
        if (!dsS) return;
        const ns = Math.ceil(rem / dsS);
        const s = np * primary.sulfur + ns * secondary.sulfur;
        if (secondary.id === 'expammo') {
          if (np === 0) return;
          if (rem > EXP_AMMO_CLEANUP_HP_LIMIT) return;
          if (ns > EXP_AMMO_CLEANUP_COUNT_LIMIT) return;
        }
        const score = s + (secondary.id === 'expammo' ? ns * EXP_AMMO_SOFT_PENALTY : 0);
        if (!best || score < best.score || (score === best.score && s < best.sulfur)) {
          best = { np, primary, ns, secondary, sulfur:s, score };
        }
      });
    }
  });
  return best;
}

function findSatchelOnly(sid, totalHp) {
  const satchel = TOOLS.find(t => t.id === 'satchel');
  const dmg = satchel.dmg[sid];
  if (!dmg) return null;
  const ns = Math.ceil(totalHp / dmg);
  return { np:0, primary:null, ns, secondary:satchel, sulfur: ns * satchel.sulfur };
}

function comboLabel(c) {
  if (!c) return '—';
  const parts = [];
  if (c.np > 0) parts.push(`${c.np}× ${c.primary.name}`);
  if (c.ns > 0) parts.push(`${c.ns}× ${c.secondary.name}`);
  return parts.join(' + ') || '—';
}

function comboSub(c) {
  if (!c) return '';
  const parts = [];
  if (c.np > 0) parts.push(`${fmt(c.np * c.primary.sulfur)} sulfur`);
  if (c.ns > 0) parts.push(`${fmt(c.ns * c.secondary.sulfur)} sulfur`);
  return parts.join(' + ');
}

function summarizeTools(counts) {
  return TOOLS
    .map(t => ({ name: t.name, qty: counts[t.id] || 0 }))
    .filter(x => x.qty > 0)
    .map(x => `${x.qty}× ${x.name}`);
}

function aggregateMaterials(counts) {
  const totals = {};
  Object.entries(counts).forEach(([toolId, qty]) => {
    const mats = MATERIAL_COSTS[toolId];
    if (!mats || qty <= 0) return;
    Object.entries(mats).forEach(([mat, amount]) => {
      totals[mat] = (totals[mat] || 0) + amount * qty;
    });
  });
  return totals;
}

function summarizeMaterials(materials) {
  const labels = {
    metal_fragments: 'Metal frags',
    low_grade_fuel: 'Low grade',
    cloth: 'Cloth',
    tech_trash: 'Tech trash',
    metal_pipe: 'Pipes',
    rope: 'Rope',
    beancan_grenade: 'Bean cans',
    gunpowder: 'Gunpowder',
  };
  return Object.entries(labels)
    .filter(([id]) => (materials[id] || 0) > 0)
    .map(([id, name]) => `${fmt(materials[id])} ${name}`);
}

function summarizeComponents(materials) {
  const components = [
    ['tech_trash', 'Tech trash'],
    ['metal_pipe', 'Pipes'],
    ['rope', 'Rope'],
    ['beancan_grenade', 'Bean cans'],
    ['cloth', 'Cloth'],
  ];
  return components
    .filter(([id]) => (materials[id] || 0) > 0)
    .map(([id, name]) => `${fmt(materials[id])} ${name}`);
}

function aggregateResourceNeeds(counts) {
  const totals = { sulfur: 0, charcoal: 0, metal_fragments: 0 };
  Object.entries(counts).forEach(([toolId, qty]) => {
    const costs = RESOURCE_COSTS[toolId];
    if (!costs || qty <= 0) return;
    totals.sulfur += (costs.sulfur || 0) * qty;
    totals.charcoal += (costs.charcoal || 0) * qty;
    totals.metal_fragments += (costs.metal_fragments || 0) * qty;
  });

  totals.wood_for_charcoal = Math.ceil(totals.charcoal * WOOD_PER_CHARCOAL);
  totals.metal_ore = totals.metal_fragments;
  totals.stone = 0;

  totals.sulfur_nodes = Math.ceil(totals.sulfur / NODE_YIELDS.sulfur);
  totals.metal_nodes = Math.ceil(totals.metal_ore / NODE_YIELDS.metal_ore);
  totals.stone_nodes = Math.ceil(totals.stone / NODE_YIELDS.stone);
  totals.wood_nodes = Math.ceil(totals.wood_for_charcoal / NODE_YIELDS.wood);
  return totals;
}

let raidList = [];
let uid = 0;
let recyclerRows = [{ component: 'Metal Pipe', qty: 1 }];

function addStructure(sid) {
  const existing = raidList.find(x => x.sid === sid);
  if (existing) { existing.qty++; }
  else {
    const s = STRUCTURES.find(x => x.id === sid);
    raidList.push({ uid: uid++, sid, name: s.name, hp: s.hp, qty: 1 });
  }
  renderAll();
}

function removeStructure(id) {
  raidList = raidList.filter(x => x.uid !== id);
  renderAll();
}

function updateQty(id, val) {
  const item = raidList.find(x => x.uid === id);
  if (item) item.qty = Math.max(1, parseInt(val) || 1);
  renderAll();
}

function renderStructList() {
  const el = document.getElementById('structList');
  el.innerHTML = '';
  const cats = [...new Set(STRUCTURES.map(s => s.cat))];
  cats.forEach(cat => {
    const lbl = document.createElement('div');
    lbl.className = 'cat-label';
    lbl.textContent = cat;
    el.appendChild(lbl);
    STRUCTURES.filter(s => s.cat === cat).forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'struct-btn';
      btn.innerHTML = `<span class="sname">${s.name}</span><span class="shp">${fmt(s.hp)} HP</span><span class="add-btn">+</span>`;
      btn.onclick = () => addStructure(s.id);
      el.appendChild(btn);
    });
  });
}

function renderRaidList() {
  const el = document.getElementById('raidList');
  if (!raidList.length) {
    el.innerHTML = '<div class="empty-list">No structures added — click + to add</div>';
    return;
  }
  el.innerHTML = raidList.map(item => `
    <div class="raid-item">
      <span class="ri-name">${item.name}</span>
      <input class="ri-qty" type="number" value="${item.qty}" min="1" max="99" data-uid="${item.uid}" />
      <span class="ri-hp">${fmt(item.hp * item.qty)} HP</span>
      <button class="remove-btn" data-uid="${item.uid}">×</button>
    </div>
  `).join('');
  el.querySelectorAll('.ri-qty').forEach(inp => {
    inp.addEventListener('change', e => { updateQty(+e.target.dataset.uid, e.target.value); });
  });
  el.querySelectorAll('.remove-btn').forEach(btn => {
    btn.addEventListener('click', e => { removeStructure(+e.target.dataset.uid); });
  });
}

function renderResults() {
  const wrap = document.getElementById('resultsWrap');
  if (!raidList.length) { wrap.innerHTML = ''; return; }

  let totalOptimal = 0;
  let totalSatchel = 0;
  const optimalCounts = {};
  const satchelCounts = {};

  raidList.forEach(item => {
    const optimal = findOptimal(item.sid, item.hp);
    const satchOnly = findSatchelOnly(item.sid, item.hp);
    if (optimal) {
      totalOptimal += optimal.sulfur * item.qty;
      if (optimal.primary && optimal.np > 0) {
        optimalCounts[optimal.primary.id] = (optimalCounts[optimal.primary.id] || 0) + (optimal.np * item.qty);
      }
      if (optimal.secondary && optimal.ns > 0) {
        optimalCounts[optimal.secondary.id] = (optimalCounts[optimal.secondary.id] || 0) + (optimal.ns * item.qty);
      }
    }
    if (satchOnly) {
      totalSatchel += satchOnly.sulfur * item.qty;
      if (satchOnly.secondary && satchOnly.ns > 0) {
        satchelCounts[satchOnly.secondary.id] = (satchelCounts[satchOnly.secondary.id] || 0) + (satchOnly.ns * item.qty);
      }
    }
  });

  const saved = totalSatchel - totalOptimal;
  const isSame = totalOptimal === totalSatchel;
  const optimalSummary = summarizeTools(optimalCounts);
  const satchelSummary = summarizeTools(satchelCounts);
  const optimalMatTotals = aggregateMaterials(optimalCounts);
  const optimalComponents = summarizeComponents(optimalMatTotals);
  const mining = aggregateResourceNeeds(optimalCounts);

  wrap.innerHTML = `
    <div class="panel">
      <div class="panel-title">// whole list comparison</div>
      <div class="struct-section">
        <div class="ss-title">Entire raid list<span> · all structures combined</span></div>
        <div class="results-panel">
          <div class="res-header"><div>Explosives</div><div>Note</div></div>
          <div class="result-row best">
            <div>
              <div class="combo-name hl">${optimalSummary.join(' + ') || '—'}<span class="badge opt">optimal</span></div>
              <div class="combo-sub">Summed explosive counts from each structure's best combo</div>
            </div>
            <div style="font-family:var(--mono);font-size:11px;color:var(--accent)">fewest sulfur</div>
          </div>
          ${!isSame ? `
          <div class="result-row satch">
            <div>
              <div class="combo-name">${satchelSummary.join(' + ') || '—'}<span class="badge sat">satchels</span></div>
              <div class="combo-sub">Satchel count for the same full raid list</div>
            </div>
            <div style="font-family:var(--mono);font-size:11px;color:var(--text3)">+${fmt(saved)} sulfur</div>
          </div>` : ''}
        </div>
      </div>
    </div>
    <div class="panel" style="margin-top:1rem;">
      <div class="panel-title">// mining estimate</div>
      <div style="font-family:var(--mono);font-size:12px;color:var(--text2);line-height:1.7;">
        <div style="margin-bottom:8px;color:var(--text3);">Estimated raw resources for optimal plan</div>
        <div><span style="font-size:14px;color:var(--text)">Sulfur:</span> <span style="color:var(--accent2)">${fmt(mining.sulfur)}</span> (~${fmt(mining.sulfur_nodes)} nodes)</div>
        <div><span style="font-size:14px;color:var(--text)">Metal ore:</span> <span style="color:var(--accent2)">${fmt(mining.metal_ore)}</span> (~${fmt(mining.metal_nodes)} nodes)</div>
        <div><span style="font-size:14px;color:var(--text)">Stone:</span> <span style="color:var(--accent2)">${fmt(mining.stone)}</span> (~${fmt(mining.stone_nodes)} nodes)</div>
        <div><span style="font-size:14px;color:var(--text)">Charcoal total:</span> <span style="color:var(--accent2)">${fmt(mining.charcoal)}</span></div>
        <div><span style="font-size:14px;color:var(--text)">Wood for charcoal:</span> <span style="color:var(--accent2)">${fmt(mining.wood_for_charcoal)}</span> (~${fmt(mining.wood_nodes)} wood nodes)</div>
        <div style="margin-top:8px;"><span style="color:var(--text3)">Components:</span> ${optimalComponents.join(' · ') || '—'}</div>
      </div>
    </div>
  `;
}

function renderAll() {
  renderRaidList();
  renderResults();
}

function renderRecyclerTotals() {
  const totals = {};
  recyclerRows.forEach(row => {
    const recipe = RECYCLER_DATA[row.component];
    if (!recipe) return;
    Object.entries(recipe).forEach(([k, v]) => {
      totals[k] = (totals[k] || 0) + v * row.qty;
    });
  });

  const out = document.getElementById('recyclerTotals');
  const keys = Object.keys(totals);
  if (!keys.length) {
    out.innerHTML = 'Add components to see recycled resources';
    return;
  }
  const labels = { metal_fragments:'Metal fragments', hq_metal:'HQ metal', cloth:'Cloth', gunpowder:'Gunpowder' };
  out.innerHTML = keys.sort().map(k => `
    <div class="recycler-out-row">
      <label>${labels[k] || k}</label>
      <span>${fmt(totals[k])}</span>
    </div>
  `).join('');
}

function renderRecyclerRows() {
  const wrap = document.getElementById('recyclerRows');
  const opts = Object.keys(RECYCLER_DATA)
    .map(name => `<option value="${name}">${name}</option>`)
    .join('');

  wrap.innerHTML = recyclerRows.map((row, idx) => `
    <div class="recycler-row">
      <select data-idx="${idx}" data-type="component">${opts}</select>
      <input data-idx="${idx}" data-type="qty" type="number" min="1" value="${row.qty}" />
      <button data-idx="${idx}" data-type="remove">×</button>
    </div>
  `).join('');

  wrap.querySelectorAll('select[data-type="component"]').forEach(sel => {
    const idx = +sel.dataset.idx;
    sel.value = recyclerRows[idx].component;
    sel.addEventListener('change', e => {
      recyclerRows[idx].component = e.target.value;
      renderRecyclerTotals();
    });
  });

  wrap.querySelectorAll('input[data-type="qty"]').forEach(inp => {
    const idx = +inp.dataset.idx;
    inp.addEventListener('change', e => {
      recyclerRows[idx].qty = Math.max(1, parseInt(e.target.value) || 1);
      e.target.value = recyclerRows[idx].qty;
      renderRecyclerTotals();
    });
  });

  wrap.querySelectorAll('button[data-type="remove"]').forEach(btn => {
    btn.addEventListener('click', e => {
      const idx = +e.target.dataset.idx;
      recyclerRows.splice(idx, 1);
      if (!recyclerRows.length) recyclerRows.push({ component: 'Metal Pipe', qty: 1 });
      renderRecyclerRows();
      renderRecyclerTotals();
    });
  });
}

function setupRecycler() {
  document.getElementById('addRecyclerRow').addEventListener('click', () => {
    recyclerRows.push({ component: 'Metal Pipe', qty: 1 });
    renderRecyclerRows();
    renderRecyclerTotals();
  });

  document.getElementById('resetRecycler').addEventListener('click', () => {
    recyclerRows = [{ component: 'Metal Pipe', qty: 1 }];
    renderRecyclerRows();
    renderRecyclerTotals();
  });

  renderRecyclerRows();
  renderRecyclerTotals();
}

function setupTabs() {
  const raidBtn = document.getElementById('tabRaid');
  const recBtn = document.getElementById('tabRecycler');
  const raidTab = document.getElementById('raidTabContent');
  const recTab = document.getElementById('recyclerTabContent');

  function setTab(tab) {
    const raid = tab === 'raid';
    raidBtn.classList.toggle('active', raid);
    recBtn.classList.toggle('active', !raid);
    raidTab.classList.toggle('hidden', !raid);
    recTab.classList.toggle('hidden', raid);
  }

  raidBtn.addEventListener('click', () => setTab('raid'));
  recBtn.addEventListener('click', () => setTab('recycler'));
}

renderStructList();
renderAll();
setupTabs();
setupRecycler();
</script>
</body>
</html>
